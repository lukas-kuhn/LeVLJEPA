defaults:
  - model: base
  - _self_

run_name: levljepa_run
wandb_project: LeVLJEPA

batch_size: 256
total_steps: 50000
lr: 2e-4
max_grad_norm: 1.0
warmup_steps: 1000
eta_min: 2e-5

lambda_vision: 0.02
lambda_text: 0.02

projector_width: 2048
projector_depth: 4

save_every_n_steps: 5000
linear_probe: true

output_dir: /path/to/outputs
cache_dir: /path/to/data
hf_bucket: your-hf-org/your-bucket

hydra:
  run:
    dir: .
